<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR Aquarium</title>

<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

#info{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,.7);
    color:white;
    padding:10px 20px;
    border-radius:20px;
    z-index:999;
}

#status{
    position:fixed;
    top:20px;
    right:20px;
    width:16px;
    height:16px;
    border-radius:50%;
    background:red;
    z-index:999;
}

#status.active{
    background:lime;
}
</style>
</head>

<body>

<div id="status"></div>

<div id="info">
Наведите камеру на маркер HIRO
</div>

<a-scene
embedded
vr-mode-ui="enabled:false"
renderer="antialias:true"
arjs="sourceType:webcam; debugUIEnabled:true;">

<a-marker preset="hiro" id="hiroMarker">

    <!-- дно -->
    <a-circle
        rotation="-90 0 0"
        radius="1"
        color="#d9c28f">
    </a-circle>

    <!-- рыбка 1 -->
    <a-entity
        position="-0.5 0.4 0"
        animation="property: position;
                   from:-0.5 0.4 0;
                   to:0.5 0.6 0;
                   dir:alternate;
                   dur:3000;
                   loop:true">

        <a-sphere
            scale="0.3 0.18 0.18"
            color="orange">
        </a-sphere>

        <a-cone
            position="-0.18 0 0"
            rotation="0 0 -90"
            radius-bottom="0.1"
            radius-top="0"
            height="0.15"
            color="orange">
        </a-cone>

    </a-entity>

    <!-- рыбка 2 -->
    <a-entity
        position="0.4 0.7 0"
        animation="property: position;
                   from:0.4 0.7 0;
                   to:-0.4 0.5 0;
                   dir:alternate;
                   dur:4000;
                   loop:true">

        <a-sphere
            scale="0.25 0.15 0.15"
            color="#1e90ff">
        </a-sphere>

        <a-cone
            position="-0.15 0 0"
            rotation="0 0 -90"
            radius-bottom="0.08"
            radius-top="0"
            height="0.12"
            color="#1e90ff">
        </a-cone>

    </a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<script>

const marker = document.getElementById('hiroMarker');
const status = document.getElementById('status');
const info = document.getElementById('info');

marker.addEventListener('markerFound', () => {
    status.classList.add('active');
    info.innerHTML = '🐠 Маркер найден!';
});

marker.addEventListener('markerLost', () => {
    status.classList.remove('active');
    info.innerHTML = 'Наведите камеру на маркер HIRO';
});

</script>

</body>
</html>
