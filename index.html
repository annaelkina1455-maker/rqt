<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web AR Аквариум</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ar.js/3.4.5/ar-threex-location-only.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #0a0e27; }

    #loading-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1a4e 50%, #0d2137 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.8s ease;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }

    .logo-container { text-align: center; margin-bottom: 40px; }
    .logo-fish { font-size: 80px; animation: fishBob 2s ease-in-out infinite; }
    @keyframes fishBob {
      0%,100% { transform: translateY(0) rotate(-5deg); }
      50% { transform: translateY(-15px) rotate(5deg); }
    }
    .logo-title {
      font-size: 2.2em; font-weight: 700; letter-spacing: 2px;
      background: linear-gradient(90deg, #00d4ff, #00ff88, #00d4ff);
      background-size: 200%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }
    .logo-sub { color: #8ab4d4; font-size: 0.9em; margin-top: 8px; letter-spacing: 3px; }

    .progress-wrap {
      width: 280px; background: rgba(255,255,255,0.1);
      border-radius: 50px; overflow: hidden;
      height: 6px; margin: 20px 0;
    }
    .progress-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #00d4ff, #00ff88);
      border-radius: 50px;
      transition: width 0.3s ease;
      box-shadow: 0 0 12px #00d4ff;
    }
    .progress-text { color: #8ab4d4; font-size: 0.85em; }

    /* HUD */
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
      z-index: 100; pointer-events: none;
    }
    .hud-title { color: white; font-size: 1.1em; font-weight: 600; letter-spacing: 1px; }
    .hud-title span { color: #00d4ff; }
    .hud-badge {
      background: rgba(0,212,255,0.2); border: 1px solid rgba(0,212,255,0.5);
      color: #00d4ff; font-size: 0.75em; padding: 4px 12px; border-radius: 20px;
      letter-spacing: 1px;
    }

    #info-panel {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 20px 24px 30px;
      background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%);
      z-index: 100; pointer-events: none;
      text-align: center;
    }
    .scan-hint {
      color: rgba(255,255,255,0.9); font-size: 1em;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .scan-icon {
      width: 32px; height: 32px; border: 2px solid #00d4ff;
      border-radius: 6px; position: relative;
      animation: scanPulse 2s ease-in-out infinite;
    }
    @keyframes scanPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(0,212,255,0.4); }
      50% { box-shadow: 0 0 0 8px rgba(0,212,255,0); }
    }
    .scan-icon::before {
      content: ''; position: absolute; left: 4px; right: 4px;
      height: 1px; background: #00d4ff;
      top: 50%; animation: scanLine 2s linear infinite;
    }
    @keyframes scanLine {
      0% { top: 20%; } 100% { top: 80%; }
    }

    #status-dot {
      position: fixed; top: 20px; right: 80px;
      width: 8px; height: 8px; border-radius: 50%;
      background: #ff4444; z-index: 101;
      box-shadow: 0 0 6px #ff4444;
      animation: statusPulse 1.5s infinite;
    }
    #status-dot.active { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
    @keyframes statusPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Fallback demo canvas */
    #demo-canvas {
      position: fixed; inset: 0;
      display: none;
    }
  </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">
  <div class="logo-container">
    <div class="logo-fish">🐠</div>
    <div class="logo-title">AR AQUARIUM</div>
    <div class="logo-sub">WEB AR · ДИПЛОМ 2025</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar" id="prog"></div>
  </div>
  <div class="progress-text" id="prog-text">Инициализация...</div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-title">🐟 <span>AR</span> Aquarium</div>
  <div class="hud-badge">HIRO MARKER</div>
</div>
<div id="status-dot"></div>

<!-- Info Panel -->
<div id="info-panel">
  <div class="scan-hint">
    <div class="scan-icon"></div>
    Наведите камеру на маркер HIRO
  </div>
</div>

<!-- AR Scene -->
<a-scene id="arScene"
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
  renderer="logarithmicDepthBuffer: true; colorManagement: true;"
  vr-mode-ui="enabled: false"
  style="position:fixed;inset:0;z-index:50;display:none;">

  <a-assets>
    <!-- Fish body geometry defined via primitives -->
  </a-assets>

  <a-marker preset="hiro" id="hiroMarker">

    <!-- Aquarium base glow -->
    <a-plane
      position="0 0.01 0"
      rotation="-90 0 0"
      width="3.5" height="3.5"
      material="color: #003366; opacity: 0.35; transparent: true; side: double"
      animation="property: material.opacity; from: 0.2; to: 0.5; dur: 2000; loop: true; dir: alternate; easing: easeInOutSine">
    </a-plane>

    <!-- Aquarium walls (transparent) -->
    <a-box position="0 0.75 -1.75" width="3.5" height="1.5" depth="0.05"
      material="color: #00aaff; opacity: 0.08; transparent: true; side: double"
      shadow></a-box>
    <a-box position="0 0.75 1.75" width="3.5" height="1.5" depth="0.05"
      material="color: #00aaff; opacity: 0.08; transparent: true; side: double"></a-box>
    <a-box position="-1.75 0.75 0" width="0.05" height="1.5" depth="3.5"
      material="color: #00aaff; opacity: 0.08; transparent: true; side: double"></a-box>
    <a-box position="1.75 0.75 0" width="0.05" height="1.5" depth="3.5"
      material="color: #00aaff; opacity: 0.08; transparent: true; side: double"></a-box>

    <!-- Sand bottom -->
    <a-plane position="0 0.005 0" rotation="-90 0 0" width="3.4" height="3.4"
      material="color: #c8a96e; opacity: 0.9; roughness: 1"></a-plane>

    <!-- Corals & seaweed (decorations) -->
    <!-- Coral 1 -->
    <a-cylinder position="-1.1 0.15 -0.8" radius="0.06" height="0.3"
      material="color: #ff6b6b" segments-radial="6"></a-cylinder>
    <a-sphere position="-1.1 0.32 -0.8" radius="0.14"
      material="color: #ff4757"></a-sphere>
    <a-sphere position="-0.97 0.38 -0.75" radius="0.09"
      material="color: #ff6b81"></a-sphere>
    <a-sphere position="-1.22 0.36 -0.85" radius="0.08"
      material="color: #ff4757"></a-sphere>

    <!-- Coral 2 -->
    <a-cylinder position="1.2 0.18 0.9" radius="0.05" height="0.36"
      material="color: #ffa502" segments-radial="6"></a-cylinder>
    <a-sphere position="1.2 0.38 0.9" radius="0.12"
      material="color: #ff6348"></a-sphere>
    <a-sphere position="1.1 0.44 0.85" radius="0.08"
      material="color: #ff7f50"></a-sphere>
    <a-sphere position="1.3 0.42 0.95" radius="0.07"
      material="color: #ff4500"></a-sphere>

    <!-- Seaweed group 1 -->
    <a-cylinder position="-0.5 0.25 1.1" radius="0.03" height="0.5"
      material="color: #2ed573" rotation="0 0 12"
      animation="property: rotation; to: 0 0 -12; dur: 2200; loop: true; dir: alternate; easing: easeInOutSine"></a-cylinder>
    <a-cylinder position="-0.4 0.3 1.1" radius="0.03" height="0.6"
      material="color: #1e90ff" rotation="0 0 -8"
      animation="property: rotation; to: 0 0 10; dur: 1800; loop: true; dir: alternate; easing: easeInOutSine"></a-cylinder>
    <a-cylinder position="-0.6 0.28 1.05" radius="0.025" height="0.55"
      material="color: #7bed9f" rotation="0 0 5"
      animation="property: rotation; to: 0 0 -15; dur: 2500; loop: true; dir: alternate; easing: easeInOutSine"></a-cylinder>

    <!-- Seaweed group 2 -->
    <a-cylinder position="0.8 0.22 -1.2" radius="0.03" height="0.44"
      material="color: #2ed573" rotation="0 0 -10"
      animation="property: rotation; to: 0 0 10; dur: 2000; loop: true; dir: alternate; easing: easeInOutSine"></a-cylinder>
    <a-cylinder position="0.9 0.26 -1.1" radius="0.025" height="0.52"
      material="color: #00b894" rotation="0 0 7"
      animation="property: rotation; to: 0 0 -13; dur: 1700; loop: true; dir: alternate; easing: easeInOutSine"></a-cylinder>

    <!-- Rock decorations -->
    <a-sphere position="1.0 0.08 -0.5" scale="0.22 0.14 0.18"
      material="color: #778ca3"></a-sphere>
    <a-sphere position="-1.3 0.07 0.6" scale="0.18 0.11 0.15"
      material="color: #95a5a6"></a-sphere>
    <a-sphere position="0.2 0.07 1.3" scale="0.15 0.1 0.13"
      material="color: #7f8c8d"></a-sphere>

    <!-- Bubbles -->
    <a-sphere position="-0.8 0.3 0.5" radius="0.04"
      material="color: white; opacity: 0.4; transparent: true"
      animation="property: position; from: -0.8 0.3 0.5; to: -0.8 1.2 0.5; dur: 3000; loop: true; easing: linear"
      animation__fade="property: material.opacity; from: 0.4; to: 0; dur: 3000; loop: true"></a-sphere>
    <a-sphere position="0.5 0.2 -0.7" radius="0.03"
      material="color: white; opacity: 0.4; transparent: true"
      animation="property: position; from: 0.5 0.2 -0.7; to: 0.5 1.3 -0.7; dur: 2500; loop: true; easing: linear; delay: 800"
      animation__fade="property: material.opacity; from: 0.4; to: 0; dur: 2500; loop: true; delay: 800"></a-sphere>
    <a-sphere position="0.0 0.15 0.3" radius="0.035"
      material="color: white; opacity: 0.35; transparent: true"
      animation="property: position; from: 0 0.15 0.3; to: 0 1.25 0.3; dur: 3500; loop: true; easing: linear; delay: 1500"
      animation__fade="property: material.opacity; from: 0.35; to: 0; dur: 3500; loop: true; delay: 1500"></a-sphere>

    <!-- === FISH 1: Clownfish (orange-white) === -->
    <a-entity id="fish1" position="0 0.5 0"
      animation="property: position; from: -1.2 0.5 0; to: 1.2 0.5 0; dur: 4000; loop: true; dir: alternate; easing: easeInOutSine"
      animation__y="property: position.y; from: 0.4; to: 0.8; dur: 1800; loop: true; dir: alternate; easing: easeInOutSine">
      <!-- body -->
      <a-sphere scale="0.22 0.13 0.12" material="color: #ff6b00"
        animation="property: rotation.z; from: -5; to: 5; dur: 600; loop: true; dir: alternate"></a-sphere>
      <!-- white stripes -->
      <a-cylinder position="0 0 0" radius="0.07" height="0.13" rotation="0 0 90"
        material="color: white; opacity: 0.9; transparent: true" segments-radial="12"></a-cylinder>
      <!-- eye -->
      <a-sphere position="0.1 0.05 0.07" radius="0.03" material="color: black"></a-sphere>
      <a-sphere position="0.12 0.06 0.07" radius="0.01" material="color: white"></a-sphere>
      <!-- tail -->
      <a-cone position="-0.22 0 0" radius-bottom="0.1" radius-top="0.01" height="0.12"
        rotation="0 0 -90" material="color: #ff4500"
        animation="property: rotation.z; from: -85; to: -95; dur: 300; loop: true; dir: alternate"></a-cone>
      <!-- top fin -->
      <a-cone position="0.05 0.1 0" radius-bottom="0.07" radius-top="0.01" height="0.1"
        rotation="0 0 0" material="color: #ff6b00; opacity: 0.8; transparent: true"></a-cone>
    </a-entity>

    <!-- === FISH 2: Blue tang === -->
    <a-entity id="fish2" position="0 0.65 0"
      animation="property: position.x; from: 1.0; to: -1.0; dur: 5500; loop: true; dir: alternate; easing: easeInOutSine"
      animation__z="property: position.z; from: -0.8; to: 0.8; dur: 4000; loop: true; dir: alternate; easing: easeInOutSine"
      animation__y="property: position.y; from: 0.55; to: 0.85; dur: 2200; loop: true; dir: alternate; easing: easeInOutSine">
      <a-sphere scale="0.2 0.11 0.1" material="color: #1e90ff"
        animation="property: rotation.z; from: -6; to: 6; dur: 500; loop: true; dir: alternate"></a-sphere>
      <a-sphere position="0.06 0.02 0.06" radius="0.025" material="color: black"></a-sphere>
      <a-sphere position="0.08 0.03 0.06" radius="0.01" material="color: white"></a-sphere>
      <!-- yellow stripe -->
      <a-torus position="-0.05 0 0" radius="0.08" radius-tubular="0.01"
        material="color: #ffd700; opacity: 0.9; transparent: true"
        rotation="0 90 0" arc="180" segments-radial="4"></a-torus>
      <a-cone position="-0.2 0 0" radius-bottom="0.09" radius-top="0.01" height="0.11"
        rotation="0 0 -90" material="color: #1a78c2"
        animation="property: rotation.z; from: -85; to: -95; dur: 280; loop: true; dir: alternate"></a-cone>
    </a-entity>

    <!-- === FISH 3: Yellow tropical fish === -->
    <a-entity id="fish3" position="0 0.45 0"
      animation="property: position.z; from: -1.1; to: 1.1; dur: 6000; loop: true; dir: alternate; easing: easeInOutSine"
      animation__x="property: position.x; from: -0.5; to: 0.5; dur: 3000; loop: true; dir: alternate; easing: easeInOutSine"
      animation__y="property: position.y; from: 0.35; to: 0.6; dur: 2600; loop: true; dir: alternate; easing: easeInOutSine">
      <a-sphere scale="0.18 0.14 0.1" material="color: #ffd700"></a-sphere>
      <a-sphere position="0.08 0.04 0.06" radius="0.025" material="color: black"></a-sphere>
      <a-sphere position="0.09 0.05 0.06" radius="0.01" material="color: white"></a-sphere>
      <a-cone position="-0.18 0 0" radius-bottom="0.1" radius-top="0.01" height="0.12"
        rotation="0 0 -90" material="color: #ffa500"
        animation="property: rotation.z; from: -83; to: -97; dur: 350; loop: true; dir: alternate"></a-cone>
      <a-cone position="0.05 0.13 0" radius-bottom="0.06" radius-top="0.01" height="0.09"
        material="color: #ffb700; opacity: 0.85; transparent: true"></a-cone>
    </a-entity>

    <!-- === FISH 4: Pink/magenta fish === -->
    <a-entity id="fish4" position="0 0.72 0"
      animation="property: position.x; from: 0.8; to: -0.8; dur: 3800; loop: true; dir: alternate; easing: easeInOutSine"
      animation__z="property: position.z; from: 0.9; to: -0.9; dur: 5000; loop: true; dir: alternate; easing: easeInOutSine"
      animation__y="property: position.y; from: 0.6; to: 0.9; dur: 1900; loop: true; dir: alternate; easing: easeInOutSine">
      <a-sphere scale="0.16 0.1 0.09" material="color: #ff69b4"></a-sphere>
      <a-sphere position="0.07 0.03 0.06" radius="0.022" material="color: black"></a-sphere>
      <a-sphere position="0.085 0.04 0.06" radius="0.009" material="color: white"></a-sphere>
      <a-cone position="-0.17 0 0" radius-bottom="0.08" radius-top="0.01" height="0.1"
        rotation="0 0 -90" material="color: #ff1493"
        animation="property: rotation.z; from: -84; to: -96; dur: 320; loop: true; dir: alternate"></a-cone>
    </a-entity>

    <!-- === FISH 5: Green fish === -->
    <a-entity id="fish5" position="0 0.55 0"
      animation="property: position.z; from: 1.2; to: -1.2; dur: 7000; loop: true; dir: alternate; easing: easeInOutSine"
      animation__x="property: position.x; from: -0.9; to: 0.3; dur: 3500; loop: true; dir: alternate; easing: easeInOutSine"
      animation__y="property: position.y; from: 0.45; to: 0.75; dur: 3000; loop: true; dir: alternate; easing: easeInOutSine">
      <a-sphere scale="0.19 0.12 0.1" material="color: #2ed573"></a-sphere>
      <a-sphere position="0.09 0.04 0.07" radius="0.024" material="color: black"></a-sphere>
      <a-sphere position="0.1 0.05 0.07" radius="0.01" material="color: white"></a-sphere>
      <a-cone position="-0.19 0 0" radius-bottom="0.085" radius-top="0.01" height="0.11"
        rotation="0 0 -90" material="color: #1e9944"
        animation="property: rotation.z; from: -86; to: -94; dur: 340; loop: true; dir: alternate"></a-cone>
      <a-cone position="0.04 0.11 0" radius-bottom="0.055" radius-top="0.01" height="0.08"
        material="color: #00e676; opacity: 0.8; transparent: true"></a-cone>
    </a-entity>

    <!-- Water surface shimmer -->
    <a-plane position="0 1.5 0" rotation="-90 0 0" width="3.4" height="3.4"
      material="color: #00aaff; opacity: 0.1; transparent: true; side: double"
      animation="property: material.opacity; from: 0.05; to: 0.18; dur: 1500; loop: true; dir: alternate; easing: easeInOutSine">
    </a-plane>

  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<!-- Demo Canvas (fallback without camera) -->
<canvas id="demo-canvas"></canvas>

<script>
// ─── Loading Screen ───────────────────────────────────────────
const prog = document.getElementById('prog');
const progText = document.getElementById('prog-text');
const steps = [
  [0,   'Инициализация...'],
  [20,  'Загрузка AR.js...'],
  [45,  'Загрузка A-Frame...'],
  [65,  'Подготовка 3D моделей...'],
  [85,  'Запуск AR движка...'],
  [100, 'Готово! 🐠'],
];
let si = 0;
function nextStep() {
  if (si >= steps.length) return;
  prog.style.width = steps[si][0] + '%';
  progText.textContent = steps[si][1];
  si++;
  if (si < steps.length) setTimeout(nextStep, 600);
  else setTimeout(startAR, 500);
}
setTimeout(nextStep, 300);

function startAR() {
  const ls = document.getElementById('loading-screen');
  ls.classList.add('hidden');
  setTimeout(() => ls.style.display = 'none', 900);

  const scene = document.getElementById('arScene');

  // Check if camera is accessible
  navigator.mediaDevices && navigator.mediaDevices.getUserMedia({ video: true })
    .then(() => {
      scene.style.display = 'block';
      // Track marker detection
      const marker = document.getElementById('hiroMarker');
      const dot = document.getElementById('status-dot');
      marker.addEventListener('markerFound', () => dot.classList.add('active'));
      marker.addEventListener('markerLost', () => dot.classList.remove('active'));
    })
    .catch(() => {
      // No camera — show demo canvas
      document.getElementById('demo-canvas').style.display = 'block';
      startDemo();
    });
}

// ─── Demo Canvas (no camera fallback) ────────────────────────
function startDemo() {
  const canvas = document.getElementById('demo-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  document.getElementById('info-panel').innerHTML = `
    <div class="scan-hint" style="flex-direction:column;gap:6px;">
      <span style="font-size:1.1em">🎓 Демо-режим (камера недоступна)</span>
      <span style="font-size:0.85em;color:#8ab4d4">Наведите камеру на маркер HIRO для AR-режима</span>
    </div>`;

  const W = () => canvas.width, H = () => canvas.height;

  const fishes = [
    { x: 0.2, y: 0.35, dx: 0.0012, dy: 0.0006, color: '#ff6b00', acc: '#ff4500', size: 28, wave: 0, wv: 0.045 },
    { x: 0.6, y: 0.45, dx: -0.0009, dy: 0.0008, color: '#1e90ff', acc: '#1a78c2', size: 24, wave: 1, wv: 0.05 },
    { x: 0.4, y: 0.6, dx: 0.0011, dy: -0.0007, color: '#ffd700', acc: '#ffa500', size: 22, wave: 2, wv: 0.04 },
    { x: 0.75, y: 0.3, dx: -0.001, dy: 0.0009, color: '#ff69b4', acc: '#ff1493', size: 20, wave: 3, wv: 0.055 },
    { x: 0.3, y: 0.7, dx: 0.0008, dy: -0.0005, color: '#2ed573', acc: '#1e9944', size: 26, wave: 4, wv: 0.042 },
  ];

  const bubbles = Array.from({length: 15}, () => ({
    x: Math.random(), y: Math.random(),
    r: 2 + Math.random() * 5, speed: 0.0003 + Math.random() * 0.0005, opacity: 0.3 + Math.random() * 0.4
  }));

  let t = 0;

  function drawFish(f, t) {
    const x = f.x * W(), y = f.y * H();
    const s = f.size * Math.min(W(), H()) / 500;
    const wobble = Math.sin(t * f.wv * 60 + f.wave) * 5;
    const dir = f.dx > 0 ? 1 : -1;

    ctx.save();
    ctx.translate(x, y);
    ctx.scale(dir, 1);
    ctx.rotate((wobble * Math.PI) / 180);

    // tail
    ctx.beginPath();
    ctx.moveTo(-s, 0);
    ctx.lineTo(-s * 1.7, -s * 0.6 + Math.sin(t * f.wv * 60 * 2) * s * 0.3);
    ctx.lineTo(-s * 1.7, s * 0.6 + Math.sin(t * f.wv * 60 * 2) * s * 0.3);
    ctx.closePath();
    ctx.fillStyle = f.acc;
    ctx.fill();

    // body
    ctx.beginPath();
    ctx.ellipse(0, 0, s, s * 0.6, 0, 0, Math.PI * 2);
    ctx.fillStyle = f.color;
    ctx.fill();

    // top fin
    ctx.beginPath();
    ctx.moveTo(-s * 0.1, -s * 0.55);
    ctx.quadraticCurveTo(s * 0.2, -s * 1.0, s * 0.4, -s * 0.55);
    ctx.closePath();
    ctx.fillStyle = f.color;
    ctx.globalAlpha = 0.75;
    ctx.fill();
    ctx.globalAlpha = 1;

    // eye
    ctx.beginPath();
    ctx.arc(s * 0.5, -s * 0.1, s * 0.15, 0, Math.PI * 2);
    ctx.fillStyle = '#1a1a1a';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(s * 0.53, -s * 0.13, s * 0.06, 0, Math.PI * 2);
    ctx.fillStyle = 'white';
    ctx.fill();

    ctx.restore();
  }

  function frame() {
    t += 1/60;
    const w = W(), h = H();
    ctx.clearRect(0, 0, w, h);

    // Background gradient
    const bg = ctx.createLinearGradient(0, 0, 0, h);
    bg.addColorStop(0, '#0d1b3e');
    bg.addColorStop(0.5, '#0a3060');
    bg.addColorStop(1, '#051a40');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    // Light rays
    ctx.save();
    for (let i = 0; i < 5; i++) {
      const rx = (0.2 + i * 0.15) * w;
      const grad = ctx.createLinearGradient(rx, 0, rx + 60, h);
      grad.addColorStop(0, 'rgba(100,200,255,0.08)');
      grad.addColorStop(1, 'rgba(100,200,255,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(rx, 0); ctx.lineTo(rx + 80, 0);
      ctx.lineTo(rx + 20 + 80, h); ctx.lineTo(rx + 20, h);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();

    // Sand
    const sand = ctx.createLinearGradient(0, h * 0.82, 0, h);
    sand.addColorStop(0, '#c8a96e');
    sand.addColorStop(1, '#a08050');
    ctx.fillStyle = sand;
    ctx.beginPath();
    ctx.moveTo(0, h * 0.83);
    for (let x = 0; x <= w; x += 40)
      ctx.quadraticCurveTo(x + 20, h * 0.83 + Math.sin(x * 0.05 + t) * 4, x + 40, h * 0.83);
    ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
    ctx.fill();

    // Bubbles
    bubbles.forEach(b => {
      b.y -= b.speed;
      if (b.y < -0.05) { b.y = 1.05; b.x = Math.random(); }
      ctx.beginPath();
      ctx.arc(b.x * w, b.y * h, b.r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(150,220,255,${b.opacity})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    });

    // Seaweed
    const sw = [[0.15, 0.82], [0.35, 0.81], [0.62, 0.83], [0.82, 0.81]];
    sw.forEach(([sx, sy], i) => {
      ctx.strokeStyle = i % 2 === 0 ? '#2ed573' : '#1e90ff';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(sx * w, sy * h);
      for (let j = 1; j <= 5; j++) {
        ctx.quadraticCurveTo(
          (sx + 0.02 * Math.sin(t * 1.5 + i + j)) * w,
          (sy - j * 0.02) * h,
          (sx + 0.01 * Math.sin(t * 1.5 + i + j + 0.5)) * w,
          (sy - j * 0.025) * h
        );
      }
      ctx.stroke();
    });

    // Fishes
    fishes.forEach(f => {
      f.x += f.dx; f.y += f.dy;
      if (f.x < 0.05 || f.x > 0.95) { f.dx *= -1; f.x = Math.max(0.05, Math.min(0.95, f.x)); }
      if (f.y < 0.1 || f.y > 0.75) { f.dy *= -1; f.y = Math.max(0.1, Math.min(0.75, f.y)); }
      drawFish(f, t);
    });

    // Waterline shimmer
    ctx.save();
    ctx.globalAlpha = 0.15 + Math.sin(t * 2) * 0.05;
    const wl = ctx.createLinearGradient(0, 0, 0, h * 0.06);
    wl.addColorStop(0, '#00d4ff');
    wl.addColorStop(1, 'transparent');
    ctx.fillStyle = wl;
    ctx.fillRect(0, 0, w, h * 0.06);
    ctx.restore();

    // Vignette
    const vig = ctx.createRadialGradient(w/2, h/2, h*0.3, w/2, h/2, h*0.8);
    vig.addColorStop(0, 'transparent');
    vig.addColorStop(1, 'rgba(0,0,0,0.5)');
    ctx.fillStyle = vig;
    ctx.fillRect(0, 0, w, h);

    requestAnimationFrame(frame);
  }

  frame();
}
</script>
