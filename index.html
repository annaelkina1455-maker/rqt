<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Aquarium</title>
<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
<style>
body { margin:0; overflow:hidden; font-family:'Segoe UI',Arial,sans-serif; }
#info {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:rgba(0,10,40,0.78); color:white;
  padding:12px 28px; border-radius:30px; z-index:999;
  font-size:1em; letter-spacing:0.5px;
  border:1px solid rgba(0,180,255,0.35);
  display:flex; align-items:center; gap:10px;
}
.scan-ring {
  width:20px; height:20px; border-radius:50%;
  border:2px solid #00d4ff; flex-shrink:0;
  animation:ring 1.6s ease-in-out infinite;
}
@keyframes ring {
  0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,0.5)}
  50%{box-shadow:0 0 0 6px rgba(0,212,255,0)}
}
#status {
  position:fixed; top:20px; right:20px;
  width:14px; height:14px; border-radius:50%;
  background:red; z-index:999; box-shadow:0 0 8px red;
  transition:background .4s,box-shadow .4s;
}
#status.active { background:lime; box-shadow:0 0 8px lime; }
</style>
</head>
<body>

<div id="status"></div>
<div id="info"><div class="scan-ring"></div>Наведите камеру на маркер HIRO</div>

<a-scene embedded vr-mode-ui="enabled:false" renderer="antialias:true"
  arjs="sourceType:webcam; debugUIEnabled:false;">

  <!-- SVG текстуры рыбок -->
  <a-assets>

    <!-- Рыбка 1: Клоунрыба (оранжевая) -->
    <img id="fish1" src="data:image/svg+xml;charset=utf-8,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 120'>
      <defs>
        <radialGradient id='g1' cx='55%25' cy='45%25' r='50%25'>
          <stop offset='0%25' stop-color='%23ffaa44'/>
          <stop offset='100%25' stop-color='%23e65c00'/>
        </radialGradient>
      </defs>
      <!-- хвост -->
      <polygon points='30,20 5,10 10,60 5,110 30,100' fill='%23e65c00'/>
      <!-- тело -->
      <ellipse cx='110' cy='60' rx='75' ry='46' fill='url(%23g1)'/>
      <!-- белые полосы -->
      <ellipse cx='105' cy='60' rx='12' ry='44' fill='white' opacity='0.85'/>
      <ellipse cx='145' cy='60' rx='8' ry='38' fill='white' opacity='0.6'/>
      <!-- спинной плавник -->
      <polygon points='70,16 110,14 130,20 110,30 70,30' fill='%23e65c00' opacity='0.9'/>
      <!-- брюшной плавник -->
      <polygon points='90,106 120,110 110,90' fill='%23e65c00' opacity='0.8'/>
      <!-- глаз -->
      <circle cx='163' cy='50' r='14' fill='white'/>
      <circle cx='165' cy='51' r='9' fill='%23222'/>
      <circle cx='168' cy='48' r='3' fill='white'/>
      <!-- рот -->
      <path d='M185,65 Q192,72 185,74' stroke='%23c94400' stroke-width='2' fill='none'/>
    </svg>"/>

    <!-- Рыбка 2: Синяя рыба-хирург -->
    <img id="fish2" src="data:image/svg+xml;charset=utf-8,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 120'>
      <defs>
        <radialGradient id='g2' cx='55%25' cy='45%25' r='50%25'>
          <stop offset='0%25' stop-color='%234db8ff'/>
          <stop offset='100%25' stop-color='%230044cc'/>
        </radialGradient>
      </defs>
      <polygon points='28,22 4,8 8,60 4,112 28,98' fill='%230055cc'/>
      <ellipse cx='108' cy='60' rx='74' ry='44' fill='url(%23g2)'/>
      <!-- жёлтый хвост-акцент -->
      <polygon points='28,22 4,8 8,60 4,112 28,98' fill='%23ffd700' opacity='0.7'/>
      <!-- жёлтая полоса -->
      <path d='M50,60 Q80,30 100,60 Q80,90 50,60' fill='%23ffd700' opacity='0.5'/>
      <polygon points='65,14 108,12 125,22 108,32 65,32' fill='%230044cc' opacity='0.85'/>
      <polygon points='85,108 118,112 108,88' fill='%230044cc' opacity='0.8'/>
      <circle cx='161' cy='50' r='13' fill='white'/>
      <circle cx='163' cy='51' r='8' fill='%23111'/>
      <circle cx='166' cy='48' r='3' fill='white'/>
      <path d='M183,65 Q190,72 183,74' stroke='%230033aa' stroke-width='2' fill='none'/>
    </svg>"/>

    <!-- Рыбка 3: Жёлтая -->
    <img id="fish3" src="data:image/svg+xml;charset=utf-8,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 120'>
      <defs>
        <radialGradient id='g3' cx='55%25' cy='45%25' r='50%25'>
          <stop offset='0%25' stop-color='%23ffe566'/>
          <stop offset='100%25' stop-color='%23e6a800'/>
        </radialGradient>
      </defs>
      <polygon points='30,18 5,8 9,60 5,112 30,102' fill='%23e6a800'/>
      <ellipse cx='110' cy='60' rx='72' ry='48' fill='url(%23g3)'/>
      <ellipse cx='110' cy='60' rx='10' ry='46' fill='%23ff8800' opacity='0.3'/>
      <polygon points='68,12 112,10 130,20 112,30 68,30' fill='%23e6a800' opacity='0.9'/>
      <polygon points='88,108 120,114 110,90' fill='%23e6a800' opacity='0.8'/>
      <circle cx='162' cy='50' r='14' fill='white'/>
      <circle cx='164' cy='51' r='9' fill='%23222'/>
      <circle cx='167' cy='48' r='3' fill='white'/>
      <path d='M184,65 Q191,72 184,74' stroke='%23aa7700' stroke-width='2' fill='none'/>
    </svg>"/>

    <!-- Рыбка 4: Розовая -->
    <img id="fish4" src="data:image/svg+xml;charset=utf-8,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 120'>
      <defs>
        <radialGradient id='g4' cx='55%25' cy='45%25' r='50%25'>
          <stop offset='0%25' stop-color='%23ffaacc'/>
          <stop offset='100%25' stop-color='%23cc0066'/>
        </radialGradient>
      </defs>
      <polygon points='30,20 5,10 9,60 5,110 30,100' fill='%23cc0066'/>
      <ellipse cx='108' cy='60' rx='72' ry='44' fill='url(%23g4)'/>
      <polygon points='66,14 108,12 126,22 108,32 66,32' fill='%23cc0066' opacity='0.88'/>
      <polygon points='86,106 118,112 108,88' fill='%23cc0066' opacity='0.8'/>
      <circle cx='160' cy='50' r='13' fill='white'/>
      <circle cx='162' cy='51' r='8' fill='%23222'/>
      <circle cx='165' cy='48' r='3' fill='white'/>
      <path d='M182,65 Q189,72 182,74' stroke='%23990044' stroke-width='2' fill='none'/>
    </svg>"/>

    <!-- Рыбка 5: Зелёная -->
    <img id="fish5" src="data:image/svg+xml;charset=utf-8,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 120'>
      <defs>
        <radialGradient id='g5' cx='55%25' cy='45%25' r='50%25'>
          <stop offset='0%25' stop-color='%2366ff99'/>
          <stop offset='100%25' stop-color='%23008844'/>
        </radialGradient>
      </defs>
      <polygon points='30,20 5,10 9,60 5,110 30,100' fill='%23008844'/>
      <ellipse cx='108' cy='60' rx='72' ry='44' fill='url(%23g5)'/>
      <ellipse cx='100' cy='60' rx='9' ry='42' fill='%2300ff88' opacity='0.35'/>
      <polygon points='66,14 108,12 126,22 108,32 66,32' fill='%23008844' opacity='0.88'/>
      <polygon points='86,106 118,112 108,88' fill='%23008844' opacity='0.8'/>
      <circle cx='160' cy='50' r='13' fill='white'/>
      <circle cx='162' cy='51' r='8' fill='%23222'/>
      <circle cx='165' cy='48' r='3' fill='white'/>
      <path d='M182,65 Q189,72 182,74' stroke='%23006633' stroke-width='2' fill='none'/>
    </svg>"/>

    <!-- Пузырёк -->
    <img id="bubble" src="data:image/svg+xml;charset=utf-8,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60'>
      <circle cx='30' cy='30' r='26' fill='none' stroke='rgba(180,230,255,0.7)' stroke-width='3'/>
      <ellipse cx='22' cy='20' rx='6' ry='4' fill='white' opacity='0.4'/>
    </svg>"/>

  </a-assets>

  <a-marker preset="hiro" id="hiroMarker">

    <!-- Дно -->
    <a-circle rotation="-90 0 0" radius="1.6" material="color:#c9a96e; roughness:1"></a-circle>
    <a-circle rotation="-90 0 0" radius="1.55"
      material="color:#0044aa; opacity:0.2; transparent:true"
      animation="property:material.opacity; from:0.1; to:0.3; dur:2000; loop:true; dir:alternate; easing:easeInOutSine">
    </a-circle>

    <!-- Кораллы (2D круги) -->
    <a-circle position="-1.0 0.01 -0.5" rotation="-90 0 0" radius="0.18" material="color:#ff4757"></a-circle>
    <a-circle position="-1.0 0.01 -0.5" rotation="-90 0 30" radius="0.1" material="color:#ff6b81"></a-circle>
    <a-circle position="1.0 0.01 0.5" rotation="-90 0 0" radius="0.16" material="color:#ff6348"></a-circle>
    <a-circle position="1.0 0.01 0.5" rotation="-90 0 20" radius="0.09" material="color:#ffa502"></a-circle>

    <!-- Водоросли -->
    <a-plane position="-0.3 0.3 0.9" width="0.06" height="0.6"
      material="color:#2ed573; opacity:0.9; transparent:true; side:double"
      animation="property:rotation.z; from:8; to:-8; dur:2200; loop:true; dir:alternate; easing:easeInOutSine"></a-plane>
    <a-plane position="-0.18 0.3 0.85" width="0.05" height="0.5"
      material="color:#00b894; opacity:0.9; transparent:true; side:double"
      animation="property:rotation.z; from:-6; to:10; dur:1900; loop:true; dir:alternate; easing:easeInOutSine"></a-plane>
    <a-plane position="0.65 0.28 -1.0" width="0.055" height="0.55"
      material="color:#55efc4; opacity:0.9; transparent:true; side:double"
      animation="property:rotation.z; from:10; to:-10; dur:2400; loop:true; dir:alternate; easing:easeInOutSine"></a-plane>

    <!-- Камушки -->
    <a-circle position="0.7 0.01 -0.3" rotation="-90 0 0" radius="0.12" material="color:#778ca3"></a-circle>
    <a-circle position="-0.85 0.01 0.5" rotation="-90 0 0" radius="0.1" material="color:#95a5a6"></a-circle>

    <!-- Пузырьки -->
    <a-image src="#bubble" position="-0.6 0.3 0.4" width="0.12" height="0.12"
      animation="property:position; from:-0.6 0.3 0.4; to:-0.6 1.3 0.4; dur:2800; loop:true; easing:linear"
      animation__o="property:material.opacity; from:0.8; to:0; dur:2800; loop:true"></a-image>
    <a-image src="#bubble" position="0.3 0.2 -0.5" width="0.09" height="0.09"
      animation="property:position; from:0.3 0.2 -0.5; to:0.3 1.3 -0.5; dur:2300; loop:true; easing:linear; delay:800"
      animation__o="property:material.opacity; from:0.8; to:0; dur:2300; loop:true; delay:800"></a-image>
    <a-image src="#bubble" position="0.05 0.15 0.2" width="0.07" height="0.07"
      animation="property:position; from:0.05 0.15 0.2; to:0.05 1.2 0.2; dur:3200; loop:true; easing:linear; delay:1600"
      animation__o="property:material.opacity; from:0.8; to:0; dur:3200; loop:true; delay:1600"></a-image>

    <!-- РЫБКА 1: Клоунрыба -->
    <a-image src="#fish1" width="0.7" height="0.42"
      animation__x="property:position.x; from:-1.0; to:1.0; dur:3500; loop:true; dir:alternate; easing:easeInOutSine"
      animation__y="property:position.y; from:0.4; to:0.75; dur:1800; loop:true; dir:alternate; easing:easeInOutSine"
      animation__z="property:position.z; from:-0.2; to:0.25; dur:2800; loop:true; dir:alternate; easing:easeInOutSine"
      animation__flip="property:scale.x; from:0.7; to:-0.7; dur:3500; loop:true; dir:alternate">
    </a-image>

    <!-- РЫБКА 2: Синяя -->
    <a-image src="#fish2" width="0.62" height="0.37"
      animation__x="property:position.x; from:0.9; to:-0.9; dur:5000; loop:true; dir:alternate; easing:easeInOutSine"
      animation__z="property:position.z; from:-0.8; to:0.8; dur:3800; loop:true; dir:alternate; easing:easeInOutSine"
      animation__y="property:position.y; from:0.55; to:0.85; dur:2300; loop:true; dir:alternate; easing:easeInOutSine"
      animation__flip="property:scale.x; from:-0.62; to:0.62; dur:5000; loop:true; dir:alternate">
    </a-image>

    <!-- РЫБКА 3: Жёлтая -->
    <a-image src="#fish3" width="0.58" height="0.35"
      animation__z="property:position.z; from:-1.0; to:1.0; dur:5500; loop:true; dir:alternate; easing:easeInOutSine"
      animation__x="property:position.x; from:-0.5; to:0.5; dur:3000; loop:true; dir:alternate; easing:easeInOutSine"
      animation__y="property:position.y; from:0.38; to:0.65; dur:2600; loop:true; dir:alternate; easing:easeInOutSine"
      animation__flip="property:scale.x; from:0.58; to:-0.58; dur:5500; loop:true; dir:alternate">
    </a-image>

    <!-- РЫБКА 4: Розовая -->
    <a-image src="#fish4" width="0.52" height="0.31"
      animation__x="property:position.x; from:0.8; to:-0.8; dur:4200; loop:true; dir:alternate; easing:easeInOutSine"
      animation__z="property:position.z; from:0.7; to:-0.7; dur:4800; loop:true; dir:alternate; easing:easeInOutSine"
      animation__y="property:position.y; from:0.6; to:0.88; dur:2000; loop:true; dir:alternate; easing:easeInOutSine"
      animation__flip="property:scale.x; from:-0.52; to:0.52; dur:4200; loop:true; dir:alternate">
    </a-image>

    <!-- РЫБКА 5: Зелёная -->
    <a-image src="#fish5" width="0.6" height="0.36"
      animation__z="property:position.z; from:1.1; to:-1.1; dur:6500; loop:true; dir:alternate; easing:easeInOutSine"
      animation__x="property:position.x; from:-0.8; to:0.4; dur:3800; loop:true; dir:alternate; easing:easeInOutSine"
      animation__y="property:position.y; from:0.45; to:0.72; dur:2900; loop:true; dir:alternate; easing:easeInOutSine"
      animation__flip="property:scale.x; from:0.6; to:-0.6; dur:6500; loop:true; dir:alternate">
    </a-image>

  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
const marker = document.getElementById('hiroMarker');
const status = document.getElementById('status');
const info = document.getElementById('info');
marker.addEventListener('markerFound', () => {
  status.classList.add('active');
  info.innerHTML = '🐠 Маркер найден! Аквариум активен';
});
marker.addEventListener('markerLost', () => {
  status.classList.remove('active');
  info.innerHTML = '<div class="scan-ring"></div> Наведите камеру на маркер HIRO';
});
</script>
</body>
</html>
